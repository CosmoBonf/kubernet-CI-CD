apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernet-ci-cd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubernet-ci-cd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubernet-ci-cd
    spec:
      containers:
        - name: app
          image: ghcr.io/cosmobonf/kubernet-ci-cd:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi


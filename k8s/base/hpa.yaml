apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kubernet-ci-cd
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kubernet-ci-cd
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60

